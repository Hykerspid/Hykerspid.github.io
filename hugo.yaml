      - title: "Service militaire"
        school:
          name: "Armée Suisse"
          url: "https://armee.ch"
        date: "2025 - 2026"
        content: |-
          Décidé à accomplir mes obligations militaires d'une traite, j'ai opté pour un service long de 10 mois consécutifs dans le domaine des télécommunications. En tant que pionnier d'ondes dirigées et conducteur C1E/D1E, mon rôle a consisté à l'établissement des communications startégiques et sécurisées dans un contexte d'aide au commandement. 
            
      - title: "Bachelor en sciences criminelles"
        school:
          name: "Université de Lausanne (UNIL)"
          url: "https://www.unil.ch/esc/fr/home/menuinst/formation/bachelor.html"
        date: "2021 - 2025"
        content: |-
          Pendant ces années j'ai acquis une palette de connaissances qui me permettent d'appréhender une multitude de cas différents. Parmi tous les cours que j'ai pu suivre, certains m'ont davantage marqués. Tel est le cas pour les cour sur les stupéfiants, les armes à feu, les incendies ou encore les révélations de traces digitales.

          Cependant, mes cours préférés ont été ceux qui m'ont fait découvrir ce dans quoi je voulais poursuivre ma carrière : des premiers cours de programmation en première année, à la criminalistique numérique et l'exploitation des traces numériques.

          En 3e année, j'ai eu le plaisir de rédiger un travail de bachelor intitulé "Cloud forensic : état de l'art". J'explore dans ce travail en quoi consiste une enquête dans un milieu de cloud, ses implications techniques et légales avant de dédier une partie sur AWS, afin de détailler les moyens que l'on peut exploiter en situation réelle.
 
