        intro: "Hi, I am"
        title: "Steven Gurtner"
        subtitle: ""
        content: "Welcome to my personal website. This is where I centralize my journey, projects, and thoughts as I evolve both professionally and personally."
        button:
          enable: false
      about:
        enable: false
        title: "About"
        content: |-
          I am currently a master's student in digital forensic science. As investigations increasingly involve digital sources, it is crucial to be able to process this data to extract meaningful information.
      education:
        enable: false
        items:
          - title: "Master in Digital Forensic Science"
            school:
              name: "University of Lausanne (UNIL)"
              url: "https://www.unil.ch/esc/en/home/menuinst/formation/masters/master-en-science-forensique-investigation-et-identification-num.html"
            date: "2026 - 2028"
            content: |-
              Present
          - title: "Bachelor in Forensic Science"
            school:
              name: "University of Lausanne (UNIL)"
              url: "https://www.unil.ch/esc/en/home/menuinst/formation/bachelor.html"
            date: "2021 - 2025"
            content: |-
              During these years, I acquired a range of knowledge that allows me to handle a variety of different cases. Among all the courses I took, some stood out more than others. This is the case for courses on narcotics, firearms, arson, and fingerprint detection. However, my favorite courses were those that made me discover what I wanted to pursue in my career: from the first programming courses in the first year to digital forensics and the exploitation of digital traces.

              Bachelor thesis titled "Cloud forensic: state of the art". In this work, I explore what an investigation in a cloud environment entails, its technical and legal implications, before dedicating a section to AWS to detail the means that can be exploited in a real-world situation.
      experience:
        enable: false
      projects:
        enable: false
      achievements:
        enable: false
      contact:
        enable: true
        title: "Contact"
        content: "Feel free to reach out via email"
        btnName: "Write to contact@sgurtner.ch"
        btnLink: mailto:contact@sgurtner.ch

