  # About
  about:
    enable: false
    title: "À propos"
    image: "/images/moi.png"
    content: |-
      Je m'appelle Steven Gurtner et je suis actuellement en études dans le domaines des sciences criminelles en Suisse. Ayant découvert un vaste domaine en bachelor et ayant un attrait pour le domaine informatique, j'ai décidé de me spécialiser dans le domaine des enquêtes dans le numérique. 

      En parallèle, je cultive ma curiosité à travers de projets personnels, comme la mise au point de ce site par exemple. L'objectif n'est pas forcément l'utilité immédiate mais plutôt le processus d'apprentissage et d'application du projet. Chaque réalisation me fait invariablement ressortir avec davantage de connaissances et d'expérience. C'est pour moi une manière concrète d'enrichir continuellement mes connaissances et mon expérience pratique.

      Voici quelques exemples de projets sur lesquels j'ai pu travailler récemment :
      - Un outil de visualisation d'articles de vente, dans une perpective d'aide à la prise de décision, développé en Python

      - Une synchronisation de fichiers entre portable et cloud, chiffré et automatisé par un script en bash

      - Récupération de fichiers sur machine Windows par contournement du verouillage Windows Hello à l'aide d'un démarrage sur clé USB

      - Chiffrement intégral d'un disque avec Veracrypt pour sécuriser un portable


    skills:
      enable: false
      title: "Voici quelques exemples de projets sur lesquels j'ai pu travailler récemment :"
      items:
        - "Outil"
        - "Outil2"

